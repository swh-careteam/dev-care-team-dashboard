document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

vw,0.6rem); flex-wrap: wrap; gap: 0.5rem;\n    }\n    .brand { display: flex; align-items: center; gap: 0.75rem; }\n    .brand-icon {\n      width: clamp(32px,4vw,48px); height: clamp(32px,4vw,48px);\n      display: flex; align-items: center; justify-content: center;\n      box-shadow: var(--brand-shadow); overflow: hidden; flex-shrink: 0;\n    }\n    .brand-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }\n    .brand-name { font-family: var(--font-h); font-size: clamp(1rem,2vw,1.6rem); font-weight: 700; color: var(--brand-name-color); letter-spacing: 0.02em; line-height: 1; }\n    .brand-sub  { font-size: clamp(0.5rem,1vw,0.65rem); font-weight: 500; color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 3px; }\n    .header-line { flex: 1; height: 1px; margin: 0 1rem; background: var(--header-line); min-width: 40px; }\n    .header-right { display: flex; align-items: center; gap: clamp(0.75rem,2vw,1.5rem); flex-wrap: wrap; }\n    .clock { font-family: var(--font-h); font-size: clamp(1rem,2vw,1.5rem); font-weight: 600; color: var(--clock-color); letter-spacing: 0.05em; font-variant-numeric: tabular-nums; white-space: nowrap; }\n    .live-pill {\n      display: flex; align-items: center; gap: 0.45rem;\n      font-family: var(--font-h); font-size: clamp(0.55rem,1vw,0.72rem); font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;\n      padding: 0.3rem 0.9rem; border-radius: 20px; border: 1.5px solid; transition: all 0.4s; white-space: nowrap;\n    }\n    .live-pill.live    { color: var(--pill-live-c); border-color: var(--pill-live-b); background: var(--pill-live-bg); box-shadow: var(--pill-live-s); }\n    .live-pill.offline { color: var(--muted); border-color: var(--pill-off-b); background: transparent; }\n    .live-pill.error   { color: var(--pill-err-c); border-color: var(--pill-err-b); background: var(--pill-err-bg); }\n    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: current h); font-size: clamp(0.7rem,1vw,0.88rem); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--card-name-color); display:flex; align-items:center; gap:0.4rem; white-space: nowrap; text-shadow: var(--card-name-shadow); }\n    .badge { font-family: var(--font-h); font-size: 0.55rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.16rem 0.5rem; border-radius: 20px; border: 1px solid; white-space: nowrap; flex-shrink: 0; transition: all 0.4s; }\n    .badge.warn      { color: var(--badge-warn-c); border-color: var(--badge-warn-b); background: var(--badge-warn-bg); }\n    .badge.crit      { color: var(--badge-crit-c); border-color: var(--badge-crit-b); background: var(--badge-crit-bg); }\n    .badge.no-agents { color: var(--badge-noag-c); border-color: var(--badge-noag-b); background: var(--badge-noag-bg); }\n\n    /* ── STATS ── */\n    .stats {\n      display: grid;\n      grid-template-columns: repeat(auto-fit, minmax(0, 1fr));\n      grid-template-rows: auto auto auto;\n      align-items: end;\n      flex: 1;\n      padding-bottom: clamp(0.3rem,0.6vw,0.5rem);\n    }\n    .stat {\n      padding: clamp(0.1rem,0.3vw,0.3rem) clamp(0.15rem,0.3vw,0.3rem) 0;\n      display: grid;\n      grid-template-rows: subgrid;\n      grid-row: span 3;\n      align-items: center;\n      text-align: center;\n    }\n    .stat.stat-today { border-left: 1px solid var(--stat-today-sep); opacity: 0.85; }\n    .stat.stat-today .stat-label { color: var(--stat-today-label); }\n    .stat-label { font-family: var(--font-h); font-size: clamp(0.48rem,0.7vw,0.62rem); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--stat-label-color); display: flex; align-items: flex-end; justify-content: center; text-align: center; line-height: 1.25; padding-bottom: 0.18rem; }\n    .stat-val   { font-family: var(--font-h); font-size: clamp(1.6rem,2.2vw,2.2rem); font-weight: 700; line-height: 1; letter-spacing: -0.01em; transiti gin-bottom: 20px; }\n    #auth-overlay p { color: var(--auth-p); font-size: 0.9rem; text-align: center; max-width: 340px; line-height: 1.65; margin-bottom: 28px; }\n    .btn-auth {\n      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); color: #fff;\n      font-family: var(--font-h); font-size: 1.05rem; font-weight: 700;\n      padding: 14px 40px; border: none; border-radius: 10px; width: 100%; max-width: 340px;\n      cursor: pointer; transition: all 0.2s ease;\n      box-shadow: 0 4px 24px rgba(37,99,235,0.45), 0 0 0 1px rgba(255,255,255,0.06);\n    }\n    .btn-auth:hover { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transform: translateY(-1px); }\n\n    /* ── TOAST ── */\n    #toast {\n      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 300;\n      background: var(--toast-bg); border: 1px solid var(--toast-border); border-radius: 10px;\n      padding: 0.75rem 1.1rem; font-size: 0.82rem; max-width: 300px; color: var(--toast-color);\n      opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; backdrop-filter: blur(4px);\n      box-shadow: 0 4px 20px rgba(0,0,0,0.08);\n    }\n    #toast.show { opacity: 1; transform: translateY(0); }\n    #toast.err  { border-color: var(--toast-err); }\n    ::-webkit-scrollbar { width: 4px; }\n    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }\n\n    /* ── SUMMARY BAND ── */\n    .summary-row {\n      display: flex;\n      border-radius: 16px; overflow: hidden;\n      border: 2px solid var(--summary-row-border);\n      box-shadow: var(--summary-row-shadow);\n      background: var(--summary-row-bg);\n      margin-bottom: clamp(0.4rem,0.8vw,0.7rem);\n    }\n    /* ── LABEL COL ── */\n    .summary-label-col {\n      display: flex; flex-direction: column; align-items: center; justify-content: center;\n      width: clamp(90px,9vw,130px); min-width: clamp(90px,9vw,130px);\n      background: var(--summary-lbl-bg);\n      border-right: { animation: numflash2 0.35s cubic-bezier(0.16,1,0.3,1); }\n\n    @media (max-width: 900px) {\n      .summary-band { grid-template-columns: 1fr; }\n      .main-grid { grid-template-columns: 1fr; }\n      .voice-panels { flex-direction: row; flex-wrap: wrap; }\n      .voice-panel { min-width: 340px; }\n    }\n\n    /* ── THEME TOGGLE ── */\n    .theme-toggle {\n      display: flex; align-items: center; gap: 0.5rem;\n      background: none; border: none; cursor: pointer; padding: 0; flex-shrink: 0;\n    }\n    .toggle-track {\n      position: relative; width: 42px; height: 22px; border-radius: 11px;\n      background: rgba(58,128,255,0.2); border: 1.5px solid rgba(58,128,255,0.35);\n      transition: background 0.3s, border-color 0.3s;\n    }\n    [data-theme=\"light\"] .toggle-track {\n      background: rgba(37,99,235,0.15); border-color: rgba(37,99,235,0.35);\n    }\n    .toggle-thumb {\n      position: absolute; top: 2px; left: 2px;\n      width: 14px; height: 14px; border-radius: 50%;\n      background: #7ec4ff; transition: transform 0.3s, background 0.3s;\n      display: flex; align-items: center; justify-content: center; font-size: 9px;\n    }\n    [data-theme=\"light\"] .toggle-thumb {\n      transform: translateX(20px);\n      background: #2563eb;\n    }\n    .toggle-label {\n      font-family: var(--font-h); font-size: clamp(0.5rem,0.8vw,0.65rem);\n      font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;\n      color: var(--muted); white-space: nowrap; user-select: none;\n    }\n  \n    /* ── AGENT STATUS CARD ── */\n    .agent-status-row {\n      display: flex; align-items: stretch;\n      border-radius: 16px; overflow: hidden;\n      border: 2px solid var(--summary-row-border);\n      box-shadow: var(--summary-row-shadow);\n      background: var(--summary-row-bg);\n      margin-bottom: clamp(0.4rem,0.8vw,0.7rem);\n    }\n    .agent-status-label {\n      display: flex; flex-direction: column; align-items: center; justify-content: center;\n 0.4rem;font-family:var(--font-b);font-size:0.55rem;color:var(--muted);letter-spacing:0.04em;\">\n      <span style=\"width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(0,230,118,0.8);animation:livepulse 2s ease-in-out infinite;flex-shrink:0;display:inline-block;\"><\u002Fspan>\n      <span id=\"global-ts\">Last updated 0 seconds ago<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <!-- Top Row: Summary + Agent Status -->\n  <div class=\"top-row\">\n  <!-- Summary Band -->\n  <div class=\"summary-row\" id=\"summary-band\">\n    <!-- Label -->\n    <div class=\"summary-label-col\">\n      <div class=\"summary-label-title\">Care Team<br>All Queues<\u002Fdiv>\n      <div class=\"summary-label-sub\">Stats from all Care Team queues combined<\u002Fdiv>\n    <\u002Fdiv>\n    <!-- Channels -->\n    <div class=\"summary-channels\">\n      <!-- Voice -->\n      <div class=\"summary-channel\">\n        <div class=\"summary-ch-header\">\n          <div class=\"summary-ch-title\">\n            <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" style=\"color:var(--summary-title)\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.64 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.55 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.29 6.29l1.27-.9a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z\"><\u002Fpath><\u002Fsvg>\n            Voice\n          <\u002Fdiv>\n          <div class=\"summary-sl-badge sl-none\" id=\"sb-voice-sl\">SL —<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"summary-stats\">\n          <div class=\"summary-stat\"><div class=\"summary-stat-val\" id=\"sb-voice-waiting\">—<\u002Fdiv><div class=\"summary-stat-lbl\" id=\"sb-voice-waiting-lbl\">Interactions<br>Waiting<\u002Fdiv><\u002Fdiv>\n          <div class=\"summary-stat\"><div class=\"summary-stat-val\" id=\"sb-voice-agents\">—<\u002Fdiv><div class=\"summary-stat-lbl\">Agents<br>On-Queue<\u002Fdiv><\u002Fdiv>\n          <div class=\"summary-stat\"><div class=\"summary-stat-val\" id=\"sb-voice-avgwait\">—<\u002Fdiv><div class=\"summary-stat-lbl\">Avg Wait<br>Today<\u002Fdiv><\u002Fdiv>\n          <div class=\"summary-stat\"><div class=\"summary-stat-val\" id=\"sb-voice-offered\">—<\u002Fdiv><div class=\"summary-stat-lbl\">Offered<br>Today<\u002Fdiv><\u002Fdiv>\n          <div class=\"summary-stat\"><div class=\"summary-stat-val\" id=\"sb-voice-abandoned\">—<\u002Fdiv><div class=\"summary-stat-lbl\">Abandoned<br>Today<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"summary-progress-row\">\n          <div class=\"summary-progress-bar\"><div class=\"summary-progress-fill\" id=\"sb-voice-bar\" style=\"width:0%\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"summary-progress-label\" id=\"sb-voice-target\">Target —%<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Chat -->\n      <div class=\"summary-channel\">\n        <div class=\"summary-ch-header\">\n          <div class=\"summary-ch-title\">\n            <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" style=\"color:var(--amber)\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg>\n            Chat\n          <\u002Fdiv>\n          <div class=\"summary-sl-badge sl-none\" id=\"sb-chat-sl\">SL —<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"summary-stats cols4\">\n          <div class=\"summary-stat\"><div class=\"summary-stat-val\" id=\"sb-chat-waiting\">—<\u002Fdiv><div class=\"summary-stat-lbl\" id=\"sb-chat-waiting-lbl\">Interactions<br>Waiting<\u002Fdiv><\u002Fdiv>\n          <div class=\"summary-stat\"><div class=\"summary-stat-val\" id=\"sb-chat-agents\">—<\u002Fdiv><div class=\"summary-stat-lbl\">Agents<br>On-Queue<\u002Fdiv><\u002Fdiv>\n          <div class=\"summary-stat\"><div class=\"summary-stat-val\" id=\"sb-chat-avgwait\">—<\u002Fdiv><div class=\"summary-stat-lbl\">Avg Wait<br>Today<\u002Fdiv><\u002Fdiv>\n          <div class=\"summary-stat\"><div class=\"summary-stat-val\" id=\"sb-chat-offered\">—<\u002Fdiv><div class=\"summary-stat-lbl\">Offered<br>Today<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"summary-progress-row\">\n          <div class=\"summary-progress-bar\"><div class=\"summary-progress-fill\" id=\"sb-chat-bar\" style=\"width:0%\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"summary-progress-label\" id=\"sb-chat-target\">Target —%<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Email -->\n      <div class=\"summary-channel\">\n        <div class=\"summary-ch-header\">\n          <div class=\"summary-ch-title\">\n            <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" style=\"color:var(--green)\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z\"><\u002Fpath><polyline points=\"22,6 12,13 2,6\"><\u002Fpolyline><\u002Fsvg>\n            Email\n          <\u002Fdiv>\n          <div class=\"summary-sl-badge sl-none\" id=\"sb-email-sl\">SL —<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"summary-stats cols4\">\n          <div class=\"summary-stat\"><div class=\"summary-stat-val\" id=\"sb-email-waiting\">—<\u002Fdiv><div class=\"summary-stat-lbl\" id=\"sb-email-waiting-lbl\">Interactions<br>Waiting<\u002Fdiv><\u002Fdiv>\n          <div class=\"summary-stat\"><div class=\"summary-stat-val\" id=\"sb-email-agents\">—<\u002Fdiv><div class=\"summary-stat-lbl\">Agents<br>On-Queue<\u002Fdiv><\u002Fdiv>\n          <div class=\"summary-stat\"><div class=\"summary-stat-val\" id=\"sb-email-avgwait\">—<\u002Fdiv><div class=\"summary-stat-lbl\">Avg Wait<br>Today<\u002Fdiv><\u002Fdiv>\n          <div class=\"summary-stat\"><div class=\"summary-stat-val\" id=\"sb-email-offered\">—<\u002Fdiv><div class=\"summary-stat-lbl\">Offered<br>Today<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"summary-progress-row\">\n          <div class=\"summary-progress-bar\"><div class=\"summary-progress-fill\" id=\"sb-email-bar\" style=\"width:0%\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"summary-progress-label\" id=\"sb-email-target\">Target —%<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Agent Status -->\n  <div class=\"agent-status-row\" id=\"agent-status-row\">\n    <div class=\"agent-status-label\">\n      <div class=\"title\">Agent<br>Status<\u002Fdiv>\n      <div class=\"sub\">Live presence<br>across all agents<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"agent-status-body\">\n      <div class=\"agent-donut-col\">\n        <div class=\"agent-donut-wrap\">\n          <svg viewBox=\"0 0 120 120\">\n            <circle class=\"track\" cx=\"60\" cy=\"60\" r=\"48\"><\u002Fcircle>\n            <g id=\"agent-donut-segs\"><\u002Fg>\n          <\u002Fsvg>\n          <div class=\"agent-donut-total\">\n            <div class=\"val\" id=\"agent-donut-val\">—<\u002Fdiv>\n            <div class=\"lbl\">Agents<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"agent-onqueue\">\n          <span class=\"swatch\" style=\"background:#4fd4e8;color:#4fd4e8;box-shadow:0 0 6px #4fd4e8\"><\u002Fspan>\n          <span class=\"name\">On-Queue<\u002Fspan>\n          <span class=\"count\" id=\"agent-onqueue-count\">—<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"agent-legend\" id=\"agent-legend\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- Main grid -->\n  <div class=\"main-grid\">\n    <div class=\"voice-panels\" id=\"voice-panels\">\n      <div style=\"text-align:center;padding:3rem 1rem;color:var(--muted);font-size:0.9rem\">Connecting…<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pods-container\" id=\"pods-container\">\n      <div style=\"text-align:center;padding:5rem 2rem;color:var(--muted);font-size:0.9rem\">Connecting…<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"auth-overlay\" style=\"display:none\">\n  <div class=\"auth-logo\"><img id=\"auth-logo\" src=\"\" alt=\"SWH\"><\u002Fdiv>\n  <h1>Care Team Dashboard<\u002Fh1>\n  <p class=\"auth-subtitle\">Real-Time Dashboard<\u002Fp>\n  <p>Sign in to monitor live queue statistics.<\u002Fp>\n  <button class=\"btn-auth\" onclick=\"doLogin()\">Sign In Here<\u002Fbutton>\n<\u002Fdiv>\n<div id=\"toast\"><\u002Fdiv>\n\n<script>\ndocument.querySelectorAll('#header-logo, #auth-logo').forEach(el => el.src = LOGO_SRC);\ndocument.getElementById('btn-all-queues').href = CONFIG.ALL_QUEUES_URL;\n\nlet token=null, timer=null, firstRender=true, lastUpdated=null, secondsTimer=null;\nlet perQueueAgg = {}; // {queueId: {nOffered, nAbandoned}}\n\n// ── CLOCK ──\nsetInterval(() => {\n  document.getElementById('clock').textContent =\n    new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true });\n}, 1000);\n\n// ── COUNTDOWN ──\nfunction startCountdown() {\n  lastUpdated = Date.now();\n  if (secondsTimer) clearInterval(secondsTimer);\n  secondsTimer = setInterval(() => {\n    const s = Math.round((Date.now() - lastUpdated) / 1000);\n    const globalTs = document.getElementById('global-ts');\n    if(globalTs) globalTs.textContent = `Last updated ${s} second${s!==1?'s':''} ago`;\n  }, 1000);\n}\n\n// ── FAVICON ──\nlet faviconTimer=null, faviconFlip=false;\nfunction makeFavicon(color) {\n  const c=document.createElement('canvas'); c.width=64; c.height=64;\n  const ctx=c.getContext('2d');\n  ctx.beginPath(); ctx.arc(32,32,30,0,Math.PI*2); ctx.fillStyle=color; ctx.fill();\n  ctx.fillStyle='#fff'; ctx.font='bold 44px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('!',32,34);\n  return c.toDataURL('image/png');\n}\nconst FAVICON_ALERT = makeFavicon('#ff2222');\nfunction setFavicon(href) {\n  let l=document.querySelector(\"link[rel*='icon']\");\n  if(!l){l=document.createElement('link');l.rel='shortcut icon';document.head.appendChild(l);}\n  l.type='image/png'; l.href=href;\n}\nfunction startAlertFlash() {\n  if(faviconTimer) return;\n  faviconTimer=setInterval(()=>{faviconFlip=!faviconFlip;setFavicon(faviconFlip?FAVICON_ALERT:LOGO_SRC);},900);\n}\nfunction stopAlertFlash() {\n  if(!faviconTimer) return; clearInterval(faviconTimer); faviconTimer=null; faviconFlip=false; setFavicon(LOGO_SRC);\n}\n\n// ── ALERT CHECK ──\nfunction checkAlerts(obs, agents) {\n  const anyAlert = allQueues().some(q => {\n    const w=(obs[q.id]||{}).waiting||0, ag=agents[q.id]??null;\n    return w>0 && (ag===0||ag===null);\n  });\n  anyAlert ? startAlertFlash() : stopAlertFlash();\n\n  // POD labels\n  CONFIG.PODS.forEach(pod => {\n    const alert = pod.queues.some(q => {\n      const w=(obs[q.id]||{}).waiting||0, ag=agents[q.id]??null;\n      return w>0 && (ag===0||ag===null);\n    });\n    const el = document.querySelector(`#pod-row-${pod.id} .pod-label-text`);\n    if(el) alert ? el.classList.add('alerting') : el.classList.remove('alerting');\n  });\n\n  // Voice panel titles\n  CONFIG.VOICE_PANELS.forEach(vp => {\n    const w=(obs[vp.queueId]||{}).waiting||0, ag=agents[vp.queueId]??null;\n    const alert = w>0 && (ag===0||ag===null);\n    const el = document.querySelector(`#${vp.id} .voice-panel-title`);\n    if(el) alert ? el.classList.add('alerting') : el.classList.remove('alerting');\n  });\n}\n\n// ── OAUTH ──\nfunction buildAuthUrl() {\n  const r=encodeURIComponent(window.location.href.split('#')[0]);\n  return `https://login.${CONFIG.REGION}/oauth/authorize?response_type=token&client_id=${encodeURIComponent(CONFIG.CLIENT_ID)}&redirect_uri=${r}&scope=${encodeURIComponent('analytics:readonly routing:readonly')}`;\n}\nfunction doLogin() { window.location.href=buildAuthUrl(); }\nfunction parseToken() {\n  const h=window.location.hash.substring(1); if(!h) return null;\n  return Object.fromEntries(new URLSearchParams(h)).access_token||null;\n}\n\n// ── API ──\nasync function api(path, opts={}) {\n  const r=await fetch(`https://api.${CONFIG.REGION}${path}`,{\n    ...opts, headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json',...(opts.headers||{})},\n  });\n  if(r.status===401){handleExpired();throw new Error('401');}\n  if(!r.ok) throw new Error(`${r.status}`);\n  return r.json();\n}\nfunction handleExpired() {\n  token=null; clearInterval(timer);\n  setBadge('error','SESSION EXPIRED');\n  toast('Session expired — please sign in again.',true);\n  setTimeout(()=>showAuth(),2000);\n}\n\n// ── OBSERVATIONS ──\nasync function getObservations() {\n  const ids=allQueues().map(q=>q.id);\n  const data=await api('/api/v2/analytics/queues/observations/query',{\n    method:'POST',\n    body:JSON.stringify({\n      filter:{type:'and',clauses:[{type:'or',predicates:ids.map(id=>({type:'dimension',dimension:'queueId',value:id}))}]},\n      groupBy:['queueId'],\n      metrics:['oWaiting','oInteracting','oAlerting','oLongestWaiting'],\n    }),\n  });\n  const map={};\n  for(const row of (data.results||[])){\n    const qId=row.group?.queueId; if(!qId) continue;\n    if(!map[qId]) map[qId]={waiting:0,interacting:0,longestWaitSec:0};\n    for(const d of (row.data||[])){\n      if(d.metric==='oLongestWaiting'){\n        const ms=d.stats?.calculatedMetricValue??0;\n        const s=ms>0?Math.round((Date.now()-ms)/1000):0;\n        if(s>map[qId].longestWaitSec) map[qId].longestWaitSec=s;\n      }\n      if(d.metric==='oWaiting')     map[qId].waiting     +=d.stats?.count??0;\n      if(d.metric==='oInteracting') map[qId].interacting +=d.stats?.count??0;\n    }\n  }\n  return map;\n}\n\n// ── AGENTS ──\nasync function getAgents(queueId) {\n  try {\n    const d=await api(`/api/v2/routing/queues/${queueId}/members?pageSize=100&expand=routingStatus,presence`);\n    return (d.entities||[]).filter(u=>u.user?.presence?.presenceDefinition?.systemPresence==='On Queue').length;\n  } catch { return null; }\n}\n\n// ── HELPERS ──\nfunction fmtTime(sec) {\n  if(!sec) return {v:'0:00',u:'h:mm'};\n  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60);\n  return {v:`${h}:${String(m).padStart(2,'0')}`,u:'h:mm'};\n}\nfunction health(waiting,ag) {\n  if(waiting>0 && (ag===0||ag===null)) return {show:true,cls:'no-agents',label:'NO AGENTS'};\n  if(waiting>0 && ag>0)               return {show:true,cls:'warn',label:'WAITING'};\n  return {show:false,cls:'',label:''};\n}\nfunction cardClass(waiting,ag) {\n  if(waiting>0 && (ag===0||ag===null)) return 'no-agents';\n  if(waiting>0 && ag>0)               return 'warn';\n  return 'ok';\n}\nfunction getThemeVar(name) {\n  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();\n}\nfunction waitColor(w) {\n  if(w>=2) return getThemeVar('--c-wait-2');\n  if(w===1) return getThemeVar('--c-wait-1');\n  return getThemeVar('--c-wait-0');\n}\nfunction agentColor(ag) {\n  if(ag===null||ag===0) return null;\n  if(ag===1) return getThemeVar('--c-ag1');\n  if(ag===2) return getThemeVar('--c-ag2');\n  if(ag===3) return getThemeVar('--c-ag3');\n  return getThemeVar('--c-agn');\n}\nfunction channelIcon(label) {\n  const l=label.toLowerCase();\n  if(l.includes('chat'))  return `<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;opacity:0.85\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"/><\u002Fsvg>`;\n  if(l.includes('email')) return `<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;opacity:0.85\"><path d=\"M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z\"/><polyline points=\"22,6 12,13 2,6\"/><\u002Fsvg>`;\n  return `<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;opacity:0.85\"><path d=\"M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.64 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.55 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.29 6.29l1.27-.9a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z\"/><\u002Fsvg>`;\n}\nfunction esc(s){return String(s).replace(/[&<>\"']/g,c=>({\"&\":\"&amp;\",\"<\":\"&lt;\",\">\":\"&gt;\",'\"':\"&quot;\",\"'\":'&#39;'}[c]));}\n\n// ── BUILD CARD HTML ──\nfunction buildCard(key, q, o, ag) {\n  const agDisplay=ag===null?'—':String(ag);\n  const h=health(o.waiting,ag), cc=cardClass(o.waiting,ag), lw=fmtTime(o.longestWaitSec);\n  const wColor=waitColor(o.waiting), aColor=agentColor(ag);\n  const isVoiceCard = q.label === 'Voice Queue';\n  const badgeHtml=h.show\n    ?`<div class=\"badge ${h.cls}\" id=\"badge-${key}\">${h.label}<\u002Fdiv>`\n    :`<div id=\"badge-${key}\" style=\"display:none\"><\u002Fdiv>`;\n  return `\n    <div class=\"card-head\"><div class=\"card-name\">${channelIcon(q.label)}${esc(q.label)}<\u002Fdiv>${badgeHtml}<\u002Fdiv>\n    <div class=\"stats\">\n      <div class=\"stat\">\n        <div class=\"stat-label\">Waiting<\u002Fdiv>\n        <div class=\"stat-val\" id=\"sv-wait-${key}\" style=\"color:${wColor}\">${o.waiting}<\u002Fdiv>\n\n      <\u002Fdiv>\n      <div class=\"stat\">\n        <div class=\"stat-label\">Agents on Queue<\u002Fdiv>\n        <div class=\"stat-val${aColor?'':' c-agent-zero'}\" id=\"sv-ag-${key}\" ${aColor?`style=\"color:${aColor}\"`:''}>${agDisplay}<\u002Fdiv>\n        <div class=\"stat-unit\">staffed<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat\">\n        <div class=\"stat-label\">Longest Waiting<\u002Fdiv>\n        <div class=\"stat-val\" id=\"sv-lw-${key}\" style=\"color:${getThemeVar('--c-lw')}\">${lw.v}<\u002Fdiv>\n        <div class=\"stat-unit\" id=\"su-lw-${key}\">${lw.u}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat stat-today\">\n        <div class=\"stat-label\">Offered<br>Today<\u002Fdiv>\n        <div class=\"stat-val\" id=\"sv-off-${key}\" style=\"color:${getThemeVar('--c-offered')}\">—<\u002Fdiv>\n\n      <\u002Fdiv>\n      ${isVoiceCard?`<div class=\"stat stat-today\">\n        <div class=\"stat-label\">Abandoned<br>Today<\u002Fdiv>\n        <div class=\"stat-val\" id=\"sv-abn-${key}\" style=\"color:${getThemeVar('--c-abandoned')}\">—<\u002Fdiv>\n\n      <\u002Fdiv>`:''}\n    <\u002Fdiv>`;\n}\n\n// ── UPDATE CARD ──\nfunction updateCard(key, o, ag) {\n  const agDisplay=ag===null?'—':String(ag);\n  const h=health(o.waiting,ag), cc=cardClass(o.waiting,ag), lw=fmtTime(o.longestWaitSec);\n  const wColor=waitColor(o.waiting), aColor=agentColor(ag);\n  const card=document.getElementById(`card-${key}`);\n  if(card) card.className=`card ${cc}`;\n  const badge=document.getElementById(`badge-${key}`);\n  if(badge){\n    if(h.show){badge.className=`badge ${h.cls}`;badge.textContent=h.label;badge.style.display='';}\n    else{badge.className='';badge.textContent='';badge.style.display='none';}\n  }\n  function flashVal(el,val,color,cls){\n    if(!el) return;\n    if(cls){el.className=`stat-val ${cls}`;el.removeAttribute('style');}\n    else{el.className='stat-val';el.style.color=color;}\n    if(el.textContent!==String(val)){el.textContent=val;el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');}\n  }\n  flashVal(document.getElementById(`sv-wait-${key}`),o.waiting,wColor,null);\n  flashVal(document.getElementById(`sv-ag-${key}`),agDisplay,aColor,aColor?null:'c-agent-zero');\n  const lwEl=document.getElementById(`sv-lw-${key}`);\n  if(lwEl&&lwEl.textContent!==lw.v){lwEl.textContent=lw.v;lwEl.classList.remove('flash');void lwEl.offsetWidth;lwEl.classList.add('flash');}\n  const suLw=document.getElementById(`su-lw-${key}`); if(suLw) suLw.textContent=lw.u;\n}\n\n// ── RENDER ──\nfunction render(obs, agents) {\n  const podsContainer=document.getElementById('pods-container');\n  const voicePanels=document.getElementById('voice-panels');\n  if(firstRender){ podsContainer.innerHTML=''; voicePanels.innerHTML=''; }\n\n  // POD rows\n  CONFIG.PODS.forEach(pod => {\n    let podRow=document.getElementById(`pod-row-${pod.id}`);\n    if(!podRow){\n      podRow=document.createElement('div');\n      podRow.id=`pod-row-${pod.id}`; podRow.className='pod-row';\n      podRow.style.setProperty('--pod-color',pod.color);\n      const labelCol=document.createElement('div'); labelCol.className='pod-label-col';\n      const labelSpan=document.createElement('span'); labelSpan.className='pod-label-text';\n      labelSpan.textContent=pod.label; labelCol.appendChild(labelSpan);\n      podRow.appendChild(labelCol);\n      const queuesDiv=document.createElement('div'); queuesDiv.className='pod-queues'; queuesDiv.id=`pod-queues-${pod.id}`;\n      podRow.appendChild(queuesDiv); podsContainer.appendChild(podRow);\n    }\n    const queuesDiv=document.getElementById(`pod-queues-${pod.id}`);\n    pod.queues.forEach(q => {\n      const o=obs[q.id]||{waiting:0,interacting:0,longestWaitSec:0};\n      const ag=agents[q.id]??null;\n      const key=`${pod.id}-${q.id}`;\n      let card=document.getElementById(`card-${key}`);\n      if(!card){\n        card=document.createElement('div'); card.id=`card-${key}`; card.className=`card ${cardClass(o.waiting,ag)}`;\n        card.innerHTML=buildCard(key,q,o,ag); queuesDiv.appendChild(card);\n      } else { updateCard(key,o,ag); }\n    });\n  });\n\n  // Voice panels\n  CONFIG.VOICE_PANELS.forEach(vp => {\n    let panel=document.getElementById(vp.id);\n    if(!panel){\n      panel=document.createElement('div');\n      panel.id=vp.id; panel.className='voice-panel';\n      panel.style.setProperty('--panel-color',vp.color);\n      const hdr=document.createElement('div'); hdr.className='voice-panel-header';\n      const ico=document.createElement('span'); ico.className='voice-panel-icon';\n      ico.innerHTML=`<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.64 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.55 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.29 6.29l1.27-.9a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z\"/><\u002Fsvg>`;\n      const title=document.createElement('div'); title.className='voice-panel-title';\n      title.textContent=vp.label; hdr.appendChild(ico); hdr.appendChild(title); panel.appendChild(hdr);\n      const q={id:vp.queueId,label:'Voice Queue'};\n      const o=obs[vp.queueId]||{waiting:0,interacting:0,longestWaitSec:0};\n      const ag=agents[vp.queueId]??null;\n      const key=`vp-${vp.queueId}`;\n      const card=document.createElement('div'); card.id=`card-${key}`; card.className=`card ${cardClass(o.waiting,ag)}`;\n      card.innerHTML=buildCard(key,q,o,ag); panel.appendChild(card);\n      voicePanels.appendChild(panel);\n    } else {\n      const o=obs[vp.queueId]||{waiting:0,interacting:0,longestWaitSec:0};\n      const ag=agents[vp.queueId]??null;\n      updateCard(`vp-${vp.queueId}`,o,ag);\n    }\n  });\n\n  firstRender=false;\n}\n\n// ── UI ──\nfunction setBadge(state,text){\n  const b=document.getElementById('live-badge'),dot=document.getElementById('live-dot');\n  b.className=`live-pill ${state}`; dot.className=`live-dot ${state==='live'?'pulse':''}`;\n  document.getElementById('badge-text').textContent=text;\n}\nfunction showAuth(){document.getElementById('auth-overlay').style.display='flex';}\nfunction toast(msg,err=false){\n  const t=document.getElementById('toast'); t.textContent=msg; t.className='show'+(err?' err':'');\n  clearTimeout(t._t); t._t=setTimeout(()=>t.className='',4000);\n}\n\n// ── SUMMARY BAND CONFIG ──\n// Map each channel to its queue IDs (from PODs only; right-panel voice queues excluded from channel summary)\nconst SUMMARY_CHANNELS = {\n  voice: {\n    // POD voice queues + all 4 specialty voice panels\n    queueIds: [\n      ...CONFIG.PODS.flatMap(p => p.queues.filter(q => q.label === 'Voice Queue').map(q => q.id)),\n      ...CONFIG.VOICE_PANELS.map(vp => vp.queueId),\n    ],\n    mediaType: 'voice',\n    slTarget: 80,   // % target\n    slThreshold: 20, // answer within 20s\n  },\n  chat: {\n    queueIds: CONFIG.PODS.flatMap(p => p.queues.filter(q => q.label === 'Chat Queue').map(q => q.id)),\n    mediaType: 'message', // Genesys API uses 'message' for chat/messaging\n    slTarget: 80,\n    slThreshold: 20,\n  },\n  email: {\n    queueIds: CONFIG.PODS.flatMap(p => p.queues.filter(q => q.label === 'Email Queue').map(q => q.id)),\n    mediaType: 'email',\n    slTarget: 80,\n    slThreshold: 86400, // 24h for email\n  },\n};\n\n// ── INTERVAL AGGREGATES (today) ──\n// ── INTERVAL AGGREGATES (today) ──\n// Endpoint & metrics confirmed from HAR: /api/v2/analytics/conversations/aggregates/query\n// nOffered=stats.count | tAbandon.count=abandoned | tAnswered.count=answered, sum=wait ms\n// tWait.sum/count = avg wait across all offered | oServiceLevel has ratio\nasync function getAggregates(queueIds, mediaType) {\n  const now = new Date();\n  const localMidnight = new Date(now);\n  localMidnight.setHours(0, 0, 0, 0);\n  const interval = `${localMidnight.toISOString()}/${now.toISOString()}`;\n\n  const data = await api('/api/v2/analytics/conversations/aggregates/query', {\n    method: 'POST',\n    body: JSON.stringify({\n      interval,\n      filter: {\n        type: 'or',\n        predicates: queueIds.map(id => ({ type: 'dimension', dimension: 'queueId', value: id }))\n      },\n      groupBy: ['queueId'],\n      metrics: ['nOffered', 'tAnswered', 'tAbandon', 'oServiceLevel', 'tWait'],\n    }),\n  });\n\n  let nOffered=0, nAbandoned=0, tAnsweredCount=0, tAnsweredSum=0,\n      tWaitSum=0, tWaitCount=0, slNumerator=0, slDenominator=0;\n\n  for (const row of (data.results || [])) {\n    for (const d of (row.data || [])) {\n      for (const m of (d.metrics || [])) {\n        const s = m.stats || {};\n        switch (m.metric) {\n          case 'nOffered':      nOffered       += s.count ?? 0; break;\n          case 'tAbandon':      nAbandoned     += s.count ?? 0; break;\n          case 'tAnswered':     tAnsweredCount += s.count ?? 0;\n                                tAnsweredSum   += s.sum   ?? 0; break;\n          case 'tWait':         tWaitSum       += s.sum   ?? 0;\n                                tWaitCount     += s.count ?? 0; break;\n          case 'oServiceLevel': slNumerator    += s.numerator   ?? 0;\n                                slDenominator  += s.denominator ?? 0; break;\n        }\n      }\n    }\n  }\n\n  const avgWaitMs = tWaitCount > 0 ? tWaitSum / tWaitCount : 0;\n  const slRatio   = slDenominator > 0 ? slNumerator / slDenominator : null;\n  return { nOffered, nAbandoned, tAnsweredCount, avgWaitMs, slRatio };\n}\n\n// ── PER-QUEUE AGGREGATES (today, all media types) ──\n// Single bulk call returning {queueId: {nOffered, nAbandoned}} for every queue\nasync function getPerQueueAggregates() {\n  // Build a mediaType lookup so we only count the correct media per queue\n  const queueMediaType = {};\n  CONFIG.PODS.forEach(pod => pod.queues.forEach(q => {\n    if (q.label === 'Voice Queue') queueMediaType[q.id] = 'voice';\n    else if (q.label === 'Chat Queue')  queueMediaType[q.id] = 'message'; // Genesys uses 'message' not 'chat'\n    else if (q.label === 'Email Queue') queueMediaType[q.id] = 'email';\n  }));\n  CONFIG.VOICE_PANELS.forEach(vp => { queueMediaType[vp.queueId] = 'voice'; });\n\n  const allIds = Object.keys(queueMediaType);\n  const now = new Date();\n  const localMidnight = new Date(now); localMidnight.setHours(0,0,0,0);\n  const interval = `${localMidnight.toISOString()}/${now.toISOString()}`;\n\n  const data = await api('/api/v2/analytics/conversations/aggregates/query', {\n    method: 'POST',\n    body: JSON.stringify({\n      interval,\n      filter: {\n        type: 'and',\n        clauses: [\n          {\n            type: 'or',\n            predicates: allIds.map(id => ({ type: 'dimension', dimension: 'queueId', value: id }))\n          }\n        ]\n      },\n      groupBy: ['queueId', 'mediaType'],\n      metrics: ['nOffered', 'tAbandon'],\n    }),\n  });\n\n  const map = {};\n  for (const row of (data.results || [])) {\n    const qid       = row.group?.queueId;\n    const mediaType = row.group?.mediaType;\n    if (!qid || !mediaType) continue;\n    // Only count rows whose mediaType matches what we expect for this queue\n    // Genesys uses both 'chat' and 'message' for chat channels\n    const expectedMedia = queueMediaType[qid];\n    const isChatMatch = (expectedMedia === 'message' && (mediaType === 'chat' || mediaType === 'message'));\n    if (expectedMedia && !isChatMatch && expectedMedia !== mediaType) continue;\n    if (!map[qid]) map[qid] = { nOffered: 0, nAbandoned: 0 };\n    for (const d of (row.data || [])) {\n      for (const m of (d.metrics || [])) {\n        const s = m.stats || {};\n        if (m.metric === 'nOffered') map[qid].nOffered  += s.count ?? 0;\n        if (m.metric === 'tAbandon') map[qid].nAbandoned += s.count ?? 0;\n      }\n    }\n  }\n  return map;\n}\n\n// ── SERVICE LEVEL ──\n// Uses oServiceLevel.ratio from Genesys (the real SL metric)\n// Falls back to tAnsweredCount / nOffered if oServiceLevel not available\nfunction calcSL(aggData) {\n  if (!aggData) return null;\n  if (aggData.slRatio !== null && aggData.slRatio !== undefined) {\n    return Math.round(aggData.slRatio * 100);\n  }\n  if (aggData.nOffered > 0) {\n    return Math.round((aggData.tAnsweredCount / aggData.nOffered) * 100);\n  }\n  return null;\n}\n\n// ── FORMAT SUMMARY WAIT ──\nfunction fmtSummaryWait(ms) {\n  if (!ms || ms < 1000) return '0:00';\n  const totalSec = Math.round(ms / 1000);\n  const h = Math.floor(totalSec / 3600);\n  const m = Math.floor((totalSec % 3600) / 60);\n  const s = totalSec % 60;\n  if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m`;\n  return `${m}:${String(s).padStart(2,'0')}`;\n}\n\n// ── UPDATE SUMMARY BAND ──\nfunction updateSummaryBand(channel, obs, agentMap, aggData) {\n  const cfg = SUMMARY_CHANNELS[channel];\n  // Live: sum waiting & agents across channel queues (POD queues only)\n  let totalWaiting = 0, totalAgents = 0;\n  for (const qid of cfg.queueIds) {\n    totalWaiting += (obs[qid]||{}).waiting || 0;\n    totalAgents  += agentMap[qid] ?? 0;\n  }\n  const sl = calcSL(aggData);\n  const slPct = sl !== null ? sl : null;\n\n  // Update DOM\n  function flashUpdate(id, val) {\n    const el = document.getElementById(id);\n    if (!el) return;\n    if (el.textContent !== String(val)) {\n      el.textContent = val;\n      el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');\n    }\n  }\n  flashUpdate(`sb-${channel}-agents`,  totalAgents);\n  flashUpdate(`sb-${channel}-waiting`, totalWaiting);\n  flashUpdate(`sb-${channel}-avgwait`, aggData ? fmtSummaryWait(aggData.avgWaitMs) : '—');\n  flashUpdate(`sb-${channel}-offered`, aggData ? aggData.nOffered : '—');\n  if (channel === 'voice') {\n    flashUpdate(`sb-${channel}-abandoned`, aggData ? (aggData.nAbandoned ?? '—') : '—');\n  }\n\n  // Singular/plural \"Interaction(s) Waiting\"\n  const waitLbl = document.getElementById(`sb-${channel}-waiting-lbl`);\n  if (waitLbl) waitLbl.innerHTML = totalWaiting === 1 ? 'Interaction<br>Waiting' : 'Interactions<br>Waiting';\n\n  // SL Badge\n  const badge = document.getElementById(`sb-${channel}-sl`);\n  if (badge) {\n    if (slPct === null) {\n      badge.textContent = 'SL —'; badge.className = 'summary-sl-badge sl-none';\n    } else {\n      badge.textContent = `SL ${slPct}%`;\n      badge.className = 'summary-sl-badge ' +\n        (slPct >= cfg.slTarget ? 'sl-good' : slPct >= cfg.slTarget - 15 ? 'sl-warn' : 'sl-crit');\n    }\n  }\n  // Progress bar — color thresholds: <25% red, <70% amber, >=70% green\n  const bar = document.getElementById(`sb-${channel}-bar`);\n  if (bar) {\n    const pct = Math.min(slPct ?? 0, 100);\n    bar.style.width = `${pct}%`;\n    bar.style.background = pct < 25 ? getThemeVar('--c-wait-2') : pct < 70 ? getThemeVar('--amber') : getThemeVar('--green');\n  }\n  const tgt = document.getElementById(`sb-${channel}-target`);\n  if (tgt) tgt.textContent = `Target ${cfg.slTarget}%`;\n}\n\n// ── POLL ──\nasync function poll() {\n  try {\n    const obs=await getObservations();\n    const agentMap={};\n    await Promise.all(allQueues().map(async q=>{ agentMap[q.id]=await getAgents(q.id); }));\n    render(obs,agentMap);\n    if(Object.keys(perQueueAgg).length) applyPerQueueAgg(); // re-apply cached agg after re-render\n    checkAlerts(obs,agentMap);\n    setBadge('live','LIVE');\n    startCountdown();\n    // Fetch aggregates for summary band (fire & update, non-blocking for render)\n    pollSummaryBand(obs, agentMap);\n  } catch(e) {\n    if(e.message!=='401'){ setBadge('error','ERROR'); toast(`Poll error: ${e.message}`,true); }\n  }\n}\n\nasync function pollSummaryBand(obs, agentMap) {\n  try {\n    const [voiceAgg, chatAgg, emailAgg, pqAgg] = await Promise.all([\n      getAggregates(SUMMARY_CHANNELS.voice.queueIds, 'voice'),\n      getAggregates(SUMMARY_CHANNELS.chat.queueIds,  'chat'),\n      getAggregates(SUMMARY_CHANNELS.email.queueIds, 'email'),\n      getPerQueueAggregates(),\n    ]);\n    updateSummaryBand('voice', obs, agentMap, voiceAgg);\n    updateSummaryBand('chat',  obs, agentMap, chatAgg);\n    updateSummaryBand('email', obs, agentMap, emailAgg);\n    perQueueAgg = pqAgg;\n    applyPerQueueAgg();\n  } catch(e) {\n    updateSummaryBand('voice', obs, agentMap, null);\n    updateSummaryBand('chat',  obs, agentMap, null);\n    updateSummaryBand('email', obs, agentMap, null);\n    console.warn('Summary band aggregate fetch failed:', e.message);\n  }\n}\n\n// Push per-queue offered/abandoned into all rendered cards\nfunction applyPerQueueAgg() {\n  // POD queues\n  CONFIG.PODS.forEach(pod => {\n    pod.queues.forEach(q => {\n      const key = `${pod.id}-${q.id}`;\n      const agg = perQueueAgg[q.id] || { nOffered: 0, nAbandoned: 0 };\n      const isVoice = q.label === 'Voice Queue';\n      updateCardAgg(key, agg, isVoice);\n    });\n  });\n  // Voice panels\n  CONFIG.VOICE_PANELS.forEach(vp => {\n    const key = `vp-${vp.queueId}`;\n    const agg = perQueueAgg[vp.queueId] || { nOffered: 0, nAbandoned: 0 };\n    updateCardAgg(key, agg, true);\n  });\n}\n\nfunction updateCardAgg(key, agg, isVoice) {\n  const offEl = document.getElementById(`sv-off-${key}`);\n  const offU  = document.getElementById(`su-off-${key}`);\n  if (offEl) {\n    if (offEl.textContent !== String(agg.nOffered)) {\n      offEl.textContent = agg.nOffered;\n      offEl.classList.remove('flash'); void offEl.offsetWidth; offEl.classList.add('flash');\n    }\n  }\n  if (isVoice) {\n    const abEl = document.getElementById(`sv-abn-${key}`);\n    const abU  = document.getElementById(`su-abn-${key}`);\n    if (abEl) {\n      if (abEl.textContent !== String(agg.nAbandoned)) {\n        abEl.textContent = agg.nAbandoned;\n        abEl.classList.remove('flash'); void abEl.offsetWidth; abEl.classList.add('flash');\n      }\n    }\n  }\n}\n\n\n// ── AGENT STATUS ──\nconst AGENT_STATUSES = [\n  { key: 'Available', color: '#00e676', sys: 'AVAILABLE' },\n  { key: 'Busy',      color: '#ff4d8f', sys: 'BUSY' },\n  { key: 'Away',      color: '#ffab00', sys: 'AWAY' },\n  { key: 'Break',     color: '#ff5555', sys: 'BREAK' },\n  { key: 'Meal',      color: '#ff8c42', sys: 'MEAL' },\n  { key: 'Meeting',   color: '#805ad5', sys: 'MEETING' },\n  { key: 'Training',  color: '#4fd4e8', sys: 'TRAINING' },\n];\n\nfunction initAgentLegend() {\n  const leg = document.getElementById('agent-legend');\n  if (!leg || leg.childElementCount) return;\n  leg.innerHTML = AGENT_STATUSES.map(s => `\n    <div class=\"agent-legend-item\">\n      <span class=\"swatch\" style=\"background:${s.color};color:${s.color}\"><\u002Fspan>\n      <span class=\"name\">${s.key}<\u002Fspan>\n      <span class=\"count\" id=\"agent-count-${s.key}\">—<\u002Fspan>\n    <\u002Fdiv>\n  `).join('');\n}\n\n// Classify a single user object into one of our status buckets.\n// Handles both system presences (AVAILABLE/BUSY/...) and custom org\n// presences whose DISPLAY name matches one of our keys (e.g. \"Break\").\nfunction classifyPresence(user) {\n  const p = user && user.presence;\n  if (!p) return null;\n  // Custom org presence name (e.g. \"Meal\", \"Training\") takes priority if it\n  // matches one of our known keys — this is what the Genesys UI shows.\n  const customName = (p.presenceDefinition && p.presenceDefinition.systemPresence === 'BUSY' && (p.message || p.presenceDefinition.id))\n    ? null : null;\n  // Primary path: match by DISPLAY name if available\n  const nameCandidates = [\n    p.name,                                 // e.g. \"Break\" (display)\n    p.presenceDefinition && p.presenceDefinition.systemPresence,  // e.g. \"AVAILABLE\"\n  ].filter(Boolean);\n  for (const cand of nameCandidates) {\n    const hit = AGENT_STATUSES.find(s =>\n      s.key.toLowerCase() === String(cand).toLowerCase() ||\n      s.sys.toLowerCase() === String(cand).toLowerCase()\n    );\n    if (hit) return hit.key;\n  }\n  return null;\n}\n\nasync function getAgentPresence() {\n  const counts = Object.fromEntries(AGENT_STATUSES.map(s => [s.key, 0]));\n  let onQueue = 0;\n  const seen = new Set();\n  const queues = allQueues();\n  const debug = { total: 0, classified: 0, unclassified: [] };\n  await Promise.all(queues.map(async q => {\n    try {\n      // Multiple expand params for reliability across Genesys API versions\n      const d = await api(`/api/v2/routing/queues/${q.id}/members?pageSize=200&joined=true&expand=routingStatus&expand=presence`);\n      for (const ent of (d.entities || [])) {\n        const u = ent.user; if (!u || seen.has(u.id)) continue; seen.add(u.id);\n        debug.total++;\n        const bucket = classifyPresence(u);\n        if (bucket) { counts[bucket]++; debug.classified++; }\n        else debug.unclassified.push({\n          name: u.name,\n          pres: u.presence && (u.presence.name || (u.presence.presenceDefinition && u.presence.presenceDefinition.systemPresence))\n        });\n        // Only count \"on-queue\" when the agent is actively available to take\n        // work on a queue (IDLE = on-queue waiting, INTERACTING = handling).\n        // Skip OFF_QUEUE, COMMUNICATING (non-ACD), and unknown/offline users.\n        const rs = String((ent.routingStatus && ent.routingStatus.status) || (u.routingStatus && u.routingStatus.status) || '').toUpperCase();\n        if (bucket && (rs === 'IDLE' || rs === 'INTERACTING')) onQueue++;\n      }\n    } catch (e) {\n      console.warn('[agents] queue fetch failed', q.id, e.message);\n    }\n  }));\n  console.log('[agents] presence counts', counts, 'on-queue:', onQueue, 'debug:', debug);\n  return { counts, onQueue };\n}\n\nfunction renderAgentDonut(data) {\n  initAgentLegend();\n  const counts = data.counts || data;     // backwards compat\n  const onQueue = data.onQueue || 0;\n  const total = AGENT_STATUSES.reduce((a,s)=>a+(counts[s.key]||0),0);\n  const totalEl = document.getElementById('agent-donut-val');\n  if (totalEl) totalEl.textContent = total;\n  AGENT_STATUSES.forEach(s => {\n    const el = document.getElementById('agent-count-'+s.key);\n    if (el) el.textContent = counts[s.key] || 0;\n  });\n  const oqEl = document.getElementById('agent-onqueue-val');\n  if (oqEl) oqEl.textContent = onQueue;\n  const segs = document.getElementById('agent-donut-segs');\n  if (!segs) return;\n  const C = 2 * Math.PI * 48;\n  let offset = 0;\n  const parts = [];\n  AGENT_STATUSES.forEach(s => {\n    const n = counts[s.key] || 0;\n    if (n <= 0 || total <= 0) return;\n    const len = (n / total) * C;\n    parts.push(`<circle class=\"seg\" cx=\"60\" cy=\"60\" r=\"48\" stroke=\"${s.color}\" style=\"color:${s.color}\" stroke-dasharray=\"${len.toFixed(2)} ${(C-len).toFixed(2)}\" stroke-dashoffset=\"${(-offset).toFixed(2)}\"/>`);\n    offset += len;\n  });\n  segs.innerHTML = parts.join('');\n}\n\n// Hook into poll() — update donut in parallel with the main refresh so a\n// slow agent-presence fetch never blocks the main render, and vice versa.\nconst _origPoll = poll;\npoll = async function() {\n  const main = _origPoll();\n  const agents = getAgentPresence()\n    .then(renderAgentDonut)\n    .catch(e => console.warn('[agents] render failed', e));\n  await main;\n  await agents;\n};\n\ninitAgentLegend();\n\ninitAgentLegend();\n\n// ── BOOT ──\n(function boot(){\n  const t=parseToken();\n  if(t){token=t;localStorage.setItem('_dbgt',t);history.replaceState(null,'',window.location.pathname);poll();timer=setInterval(poll,CONFIG.REFRESH_MS);return;}\n  const stored=localStorage.getItem('_dbgt');\n  if(stored){token=stored;poll();timer=setInterval(poll,CONFIG.REFRESH_MS);return;}\n  showAuth();\n})();\n\n// ── THEME TOGGLE ──\n(function initTheme() {\n  const saved = localStorage.getItem('swh-theme') || 'dark';\n  applyTheme(saved);\n})();\n\nfunction applyTheme(theme) {\n  document.documentElement.setAttribute('data-theme', theme);\n  localStorage.setItem('swh-theme', theme);\n  const lbl = document.getElementById('theme-label');\n  if (lbl) lbl.textContent = theme === 'dark' ? 'Light' : 'Dark';\n  // Re-render stat colors if data already loaded\n  if (!firstRender) {\n    document.querySelectorAll('[id^=\"sv-wait-\"]').forEach(el => {\n      const key = el.id.replace('sv-wait-','');\n      const val = parseInt(el.textContent) || 0;\n      el.style.color = waitColor(val);\n    });\n  }\n}\n\nfunction toggleTheme() {\n  const current = document.documentElement.getAttribute('data-theme') || 'dark';\n  applyTheme(current === 'dark' ? 'light' : 'dark');\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
